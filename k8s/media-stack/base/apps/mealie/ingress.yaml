apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mealie
  namespace: media
  annotations:
    cert-manager.io/cluster-issuer: replace-me
spec:
  ingressClassName: replace-me
  tls:
    - hosts:
        - mealie.example.local
      secretName: mealie-tls
  rules:
    - host: mealie.example.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mealie
                port:
                  number: 80
