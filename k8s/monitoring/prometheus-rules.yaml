apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: home-stack-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: home-stack-workloads
      rules:
        - alert: HomeStackPodCrashLooping
          expr: |
            sum by (namespace, pod, container) (
              increase(kube_pod_container_status_restarts_total{namespace="media"}[10m])
            ) > 3
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Pod is crash looping
            description: '{{ $labels.namespace }}/{{ $labels.pod }} container {{ $labels.container }} restarted repeatedly.'

        - alert: HomeStackPVCUsageHigh
          expr: |
            (
              kubelet_volume_stats_used_bytes{namespace="media"}
              /
              kubelet_volume_stats_capacity_bytes{namespace="media"}
            ) > 0.85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: PVC usage above 85%
            description: '{{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is above 85% usage.'

        - alert: HomeStackPVCUsageCritical
          expr: |
            (
              kubelet_volume_stats_used_bytes{namespace="media"}
              /
              kubelet_volume_stats_capacity_bytes{namespace="media"}
            ) > 0.95
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: PVC usage above 95%
            description: '{{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is above 95% usage.'

    - name: home-stack-longhorn
      rules:
        - alert: LonghornBackupTargetUnavailable
          expr: max(longhorn_backup_target_available) < 1
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: Longhorn backup target unavailable
            description: Longhorn backup target has been unavailable for more than 10 minutes.

        - alert: LonghornVolumeDegraded
          expr: |
            sum(longhorn_volume_robustness{robustness=~"degraded|faulted|unknown"}) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Longhorn volume not healthy
            description: One or more Longhorn volumes are degraded, faulted, or unknown.
